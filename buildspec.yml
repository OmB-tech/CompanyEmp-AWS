version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Installing HTMLHint..."
      - npm install -g htmlhint
      - apt-get update
      - apt-get install -y zip unzip

  pre_build:
    commands:
      - echo "Checking HTML files..."
      - htmlhint "**/*.html"

  build:
    commands:
      - echo "Creating deployment package..."
      - zip -r website.zip .

      - echo "Uploading website to S3..."
      - aws s3 cp website.zip s3://YOUR_BUCKET_NAME/website.zip

      - echo "Deploying to EC2 using Systems Manager..."

      - aws ssm send-command \
          --instance-ids YOUR_INSTANCE_ID \
          --document-name "AWS-RunShellScript" \
          --comment "Deploy Employee Portal" \
          --parameters 'commands=[
            "cd /tmp",
            "aws s3 cp s3://YOUR_BUCKET_NAME/website.zip .",
            "rm -rf website",
            "mkdir website",
            "unzip -o website.zip -d website",
            "sudo cp -r website/* /var/www/html/",
            "sudo systemctl reload nginx"
          ]'

artifacts:
  files:
    - '**/*'